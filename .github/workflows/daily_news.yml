name: Daily News Scraper

on:
  schedule:
    # 台灣時間 08:00 (UTC 00:00)
    - cron: '0 0 * * *'
  # 允許手動觸發 (供測試用)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Run Scraper
      run: python scraper.py
        
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add news_briefing.json
        # 如果只有在新聞有更新時才 commit，避免發生 error
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update daily news [skip ci]" && git push)
