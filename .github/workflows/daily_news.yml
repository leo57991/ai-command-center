name: Daily News Scraper

on:
  schedule:
    # 每天 UTC 00:00 執行 (台灣時間早上 8 點)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動從 GitHub 網頁觸發

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # 授予 GitHub Action 推送更新檔案的權限
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Run scraper script
      run: python scraper.py
      
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add news_briefing.json
        
        # 檢查是否有檔案更新，有才發布 Commit
        if ! git diff --staged --empty; then
          git commit -m "Auto-update: 每日新聞爬蟲同步"
          git push
        else
          echo "No news changes to commit."
        fi
